<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge OS - Sprite Animator</title>
    <style>
        :root {
            --bg-darker: #08070e;
            --bg-panel: #111019;
            --bg-active: #1e1b2e;
            --accent-glow: #00ffcc;
            --accent-pink: #ff007f;
            --border-dim: #252236;
            --text-white: #ffffff;
            --text-dim: #797693;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .terminal-container {
            background-color: var(--bg-panel);
            border: 2px solid var(--border-dim);
            border-radius: 12px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.08);
            display: grid;
            grid-template-columns: 1fr;
            padding: 20px;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .terminal-container {
                grid-template-columns: 280px 1fr;
            }
        }

        .app-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--border-dim);
            padding-bottom: 15px;
        }

        .system-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .config-bar {
            display: flex;
            gap: 10px;
        }

        .config-select, .config-btn {
            background: var(--bg-darker);
            border: 1px solid var(--border-dim);
            color: var(--accent-glow);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .config-btn:hover {
            border-color: var(--accent-glow);
        }

        .canvas-workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .grid-frame-wrapper {
            position: relative;
            background-color: var(--bg-darker);
            border: 2px solid var(--accent-glow);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.15);
            border-radius: 6px;
            overflow: hidden;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 1 / 1;
        }

        .grid-board {
            display: grid;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .cell {
            border-right: 1px solid rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.02);
            background-color: transparent;
        }

        .sidebar-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: var(--bg-darker);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 15px;
        }

        .sidebar-section {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 15px;
        }

        .sidebar-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .label-tags {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .grid-tools {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .tool-btn {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-dim);
            color: var(--text-white);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            text-align: left;
            transition: all 0.1s ease;
        }

        .tool-btn:hover {
            border-color: var(--accent-glow);
        }

        .tool-btn.active {
            background-color: var(--accent-glow);
            border-color: var(--accent-glow);
            color: var(--bg-darker);
            font-weight: bold;
        }

        .swatch-matrix {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }

        .swatch {
            aspect-ratio: 1 / 1;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .swatch.active {
            border-color: var(--text-white);
            transform: scale(1.1);
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-panel);
            border: 1px solid var(--border-dim);
            padding: 6px;
            border-radius: 4px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 3px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--border-dim);
            border-radius: 3px;
        }

        .animation-timeline {
            grid-column: 1 / -1;
            background-color: var(--bg-darker);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .frame-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .frame-node {
            flex-shrink: 0;
            width: 55px;
            height: 55px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.8rem;
            position: relative;
        }

        .frame-node.active {
            border-color: var(--accent-pink);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
        }

        .frame-node .frame-del {
            position: absolute;
            top: 1px;
            right: 2px;
            font-size: 0.55rem;
            color: var(--accent-pink);
            cursor: pointer;
        }

        .preview-mini-monitor {
            width: 80px;
            height: 80px;
            background-color: var(--bg-darker);
            border: 1px solid var(--accent-pink);
            border-radius: 6px;
            position: relative;
        }

        #preview-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        input[type="range"] {
            accent-color: var(--accent-glow);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="app-header">
            <div class="system-title">&gt; PIXELFORGE_OS_V2</div>
            <div class="config-bar">
                <button class="config-btn" id="audio-toggle" onclick="toggleMute()">🔊 SOUND: ON</button>
                <select class="config-select" id="resolution-select" onchange="changeResolution(this.value)">
                    <option value="8">RESOLUTION: 8x8</option>
                    <option value="16" selected>RESOLUTION: 16x16</option>
                    <option value="32">RESOLUTION: 32x32</option>
                </select>
            </div>
        </div>

        <div class="sidebar-controls">
            <div class="sidebar-section">
                <div class="label-tags">Matrix Tools</div>
                <div class="grid-tools">
                    <button class="tool-btn active" id="tool-pencil" onclick="setTool('pencil')">✏️ PENCIL</button>
                    <button class="tool-btn" id="tool-bucket" onclick="setTool('bucket')">🪣 BUCKET</button>
                    <button class="tool-btn" id="tool-dropper" onclick="setTool('dropper')">🧪 DROPPER</button>
                    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">🧼 ERASE</button>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="label-tags">Symmetry Mode</div>
                <select class="config-select" style="width: 100%;" id="symmetry-select">
                    <option value="none">NO SYMMETRY</option>
                    <option value="horizontal">HORIZONTAL MIRROR</option>
                    <option value="vertical">VERTICAL MIRROR</option>
                    <option value="dual">DUAL AXIS MIRROR</option>
                </select>
            </div>

            <div class="sidebar-section">
                <div class="label-tags">Color Swatches</div>
                <div class="swatch-matrix" id="swatch-grid"></div>
                <div class="color-picker-wrapper">
                    <span style="font-size:0.7rem; color:var(--text-dim);">CUSTOM</span>
                    <input type="color" id="color-picker" value="#00ffcc" oninput="selectColor(this.value, false)">
                </div>
            </div>

            <div class="sidebar-section" style="border:none;">
                <button class="config-btn" style="width: 100%; color: var(--accent-pink); border-color: var(--accent-pink);" onclick="clearCurrentFrame()">CLEAR GRID</button>
            </div>
        </div>

        <div class="canvas-workspace">
            <div class="grid-frame-wrapper">
                <div class="grid-board" id="canvas-grid"></div>
            </div>

            <div class="playback-controls">
                <button class="config-btn" id="play-btn" onclick="togglePlay()">▶️ PLAY PREVIEW</button>
                <div class="slider-box">
                    <span>SPEED:</span>
                    <input type="range" id="fps-slider" min="1" max="12" value="4" oninput="updateFPS(this.value)">
                    <span id="fps-val">4 FPS</span>
                </div>
            </div>
        </div>

        <div class="animation-timeline">
            <div class="timeline-header">
                <span class="label-tags" style="color: var(--accent-pink);">Animation Frames</span>
                <div style="display:flex; gap:10px;">
                    <button class="config-btn" onclick="addNewFrame()">+ NEW FRAME</button>
                    <button class="config-btn" style="color: var(--accent-glow); border-color: var(--accent-glow);" onclick="exportSpriteSheet()">COMPILE & DOWNLOAD</button>
                </div>
            </div>
            <div style="display: flex; gap:15px; align-items: center;">
                <div class="preview-mini-monitor">
                    <canvas id="preview-canvas"></canvas>
                </div>
                <div class="frame-strip" id="frame-timeline"></div>
            </div>
        </div>
    </div>

    <script>
        let gridSize = 16;
        let selectedColor = '#00ffcc';
        let currentTool = 'pencil';
        let isDrawing = false;
        let isMuted = false;
        
        let frames = [];
        let activeFrameIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let fps = 4;

        const defaultPalette = [
            '#000000', '#ffffff', '#ff007f', '#00ffcc', '#0099ff', '#ffcc00',
            '#ff3333', '#33cc33', '#9933ff', '#ff6600', '#663300', '#999999'
        ];

        function playSound(freq, duration, type = "square") {
            if (isMuted) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.03, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('audio-toggle').innerText = isMuted ? "🔇 SOUND: OFF" : "🔊 SOUND: ON";
            if (!isMuted) playSound(600, 0.1, 'sine');
        }

        function buildGridUI() {
            const container = document.getElementById('canvas-grid');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

            const frameData = frames[activeFrameIndex];

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.style.backgroundColor = frameData[i] || 'transparent';

                cell.addEventListener('mousedown', (e) => {
                    isDrawing = true;
                    cellAction(i);
                });

                cell.addEventListener('mouseenter', () => {
                    if (isDrawing) cellAction(i);
                });

                container.appendChild(cell);
            }
            document.body.onmouseup = () => { isDrawing = false; };
        }

        function buildTimelineUI() {
            const container = document.getElementById('frame-timeline');
            container.innerHTML = '';
            frames.forEach((frame, idx) => {
                const node = document.createElement('div');
                node.classList.add('frame-node');
                if (idx === activeFrameIndex) node.classList.add('active');
                node.innerText = `${idx + 1}`;
                
                node.addEventListener('click', (e) => {
                    if (e.target.classList.contains('frame-del')) return;
                    saveCurrentFrameState();
                    activeFrameIndex = idx;
                    buildGridUI();
                    buildTimelineUI();
                    playSound(440, 0.05, 'triangle');
                });

                if (frames.length > 1) {
                    const del = document.createElement('div');
                    del.classList.add('frame-del');
                    del.innerText = 'X';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteFrame(idx);
                    });
                    node.appendChild(del);
                }

                container.appendChild(node);
            });
        }

        function saveCurrentFrameState() {
            const cells = document.querySelectorAll('#canvas-grid .cell');
            const data = [];
            cells.forEach(cell => {
                data.push(cell.style.backgroundColor || 'transparent');
            });
            frames[activeFrameIndex] = data;
        }

        function deleteFrame(index) {
            frames.splice(index, 1);
            if (activeFrameIndex >= frames.length) {
                activeFrameIndex = frames.length - 1;
            }
            buildGridUI();
            buildTimelineUI();
            playSound(220, 0.2, 'sawtooth');
        }

        function addNewFrame() {
            saveCurrentFrameState();
            const newFrame = Array(gridSize * gridSize).fill('transparent');
            frames.push(newFrame);
            activeFrameIndex = frames.length - 1;
            buildGridUI();
            buildTimelineUI();
            playSound(587, 0.1, 'sine');
        }

        function changeResolution(res) {
            gridSize = parseInt(res);
            frames = [Array(gridSize * gridSize).fill('transparent')];
            activeFrameIndex = 0;
            buildGridUI();
            buildTimelineUI();
            playSound(330, 0.25, 'triangle');
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if (tool === 'pencil') document.getElementById('tool-pencil').classList.add('active');
            if (tool === 'bucket') document.getElementById('tool-bucket').classList.add('active');
            if (tool === 'dropper') document.getElementById('tool-dropper').classList.add('active');
            if (tool === 'eraser') document.getElementById('tool-eraser').classList.add('active');
            playSound(700, 0.03, 'sine');
        }

        function selectColor(color, updatePicker = true) {
            selectedColor = color;
            document.querySelectorAll('.swatch').forEach(sw => sw.classList.remove('active'));
            if (updatePicker) {
                document.getElementById('color-picker').value = color;
            }
        }

        function buildPaletteSwatches() {
            const container = document.getElementById('swatch-grid');
            container.innerHTML = '';
            defaultPalette.forEach((col, idx) => {
                const sw = document.createElement('div');
                sw.classList.add('swatch');
                sw.style.backgroundColor = col;
                if (col === selectedColor) sw.classList.add('active');
                sw.addEventListener('click', () => {
                    selectColor(col);
                    sw.classList.add('active');
                    playSound(900, 0.02, 'sine');
                });
                container.appendChild(sw);
            });
        }

        function cellAction(index) {
            const cells = document.querySelectorAll('#canvas-grid .cell');
            const targetColor = cells[index].style.backgroundColor || 'transparent';

            if (currentTool === 'dropper') {
                if (targetColor !== 'transparent') {
                    selectColor(rgbToHex(targetColor));
                }
                setTool('pencil');
                return;
            }

            if (currentTool === 'bucket') {
                const replacementColor = selectedColor;
                floodFill(index, targetColor, replacementColor);
                saveCurrentFrameState();
                playSound(180, 0.15, 'sawtooth');
                return;
            }

            const fillValue = currentTool === 'eraser' ? 'transparent' : selectedColor;
            applyColorWithSymmetry(index, fillValue);
            saveCurrentFrameState();
            playSound(1200, 0.02, 'square');
        }

        function applyColorWithSymmetry(index, value) {
            const cells = document.querySelectorAll('#canvas-grid .cell');
            const x = index % gridSize;
            const y = Math.floor(index / gridSize);
            const symMode = document.getElementById('symmetry-select').value;

            const coords = [{ x, y }];

            if (symMode === 'horizontal' || symMode === 'dual') {
                coords.push({ x: gridSize - 1 - x, y });
            }
            if (symMode === 'vertical' || symMode === 'dual') {
                coords.push({ x, y: gridSize - 1 - y });
            }
            if (symMode === 'dual') {
                coords.push({ x: gridSize - 1 - x, y: gridSize - 1 - y });
            }

            coords.forEach(coord => {
                const targetIdx = coord.y * gridSize + coord.x;
                if (targetIdx >= 0 && targetIdx < cells.length) {
                    cells[targetIdx].style.backgroundColor = value === 'transparent' ? '' : value;
                }
            });
        }

        function floodFill(startIndex, targetColor, replacementColor) {
            if (targetColor === replacementColor) return;
            const cells = document.querySelectorAll('#canvas-grid .cell');
            const queue = [startIndex];
            const visited = new Set();

            while (queue.length > 0) {
                const curr = queue.shift();
                if (visited.has(curr)) continue;
                visited.add(curr);

                const currColor = cells[curr].style.backgroundColor || 'transparent';
                if (currColor === targetColor) {
                    cells[curr].style.backgroundColor = replacementColor;

                    const x = curr % gridSize;
                    const y = Math.floor(curr / gridSize);

                    if (x > 0) queue.push(curr - 1);
                    if (x < gridSize - 1) queue.push(curr + 1);
                    if (y > 0) queue.push(curr - gridSize);
                    if (y < gridSize - 1) queue.push(curr + gridSize);
                }
            }
        }

        function rgbToHex(rgb) {
            if (rgb.startsWith('#')) return rgb;
            const parts = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
            if (!parts) return '#000000';
            delete(parts[0]);
            for (let i = 1; i <= 3; ++i) {
                parts[i] = parseInt(parts[i]).toString(16);
                if (parts[i].length == 1) parts[i] = '0' + parts[i];
            }
            return '#' + parts.join('');
        }

        function clearCurrentFrame() {
            const cells = document.querySelectorAll('#canvas-grid .cell');
            cells.forEach(cell => cell.style.backgroundColor = '');
            saveCurrentFrameState();
            playSound(150, 0.3, 'sawtooth');
        }

        let previewIdx = 0;
        function renderLivePreview() {
            const pCanvas = document.getElementById('preview-canvas');
            const pCtx = pCanvas.getContext('2d');
            pCanvas.width = gridSize;
            pCanvas.height = gridSize;

            const frameData = frames[previewIdx];
            if (!frameData) return;

            pCtx.clearRect(0, 0, gridSize, gridSize);
            for (let i = 0; i < gridSize * gridSize; i++) {
                const x = i % gridSize;
                const y = Math.floor(i / gridSize);
                const col = frameData[i];
                if (col && col !== 'transparent') {
                    pCtx.fillStyle = col;
                    pCtx.fillRect(x, y, 1, 1);
                }
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                btn.innerText = '⏸️ PAUSE PREVIEW';
                btn.style.color = 'var(--accent-pink)';
                btn.style.borderColor = 'var(--accent-pink)';
                startPlayback();
            } else {
                btn.innerText = '▶️ PLAY PREVIEW';
                btn.style.color = 'var(--accent-glow)';
                btn.style.borderColor = 'var(--accent-glow)';
                stopPlayback();
            }
        }

        function startPlayback() {
            stopPlayback();
            playInterval = setInterval(() => {
                previewIdx = (previewIdx + 1) % frames.length;
                renderLivePreview();
                playSound(1000, 0.01, 'sine');
            }, 1000 / fps);
        }

        function stopPlayback() {
            if (playInterval) clearInterval(playInterval);
        }

        function updateFPS(val) {
            fps = parseInt(val);
            document.getElementById('fps-val').innerText = `${fps} FPS`;
            if (isPlaying) {
                startPlayback();
            }
        }

        function exportSpriteSheet() {
            saveCurrentFrameState();
            const canvasSize = gridSize * 16;
            const totalWidth = canvasSize * frames.length;
            
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = totalWidth;
            exportCanvas.height = canvasSize;
            const ctx = exportCanvas.getContext('2d');

            frames.forEach((frameData, fIdx) => {
                const xOffset = fIdx * canvasSize;
                for (let i = 0; i < gridSize * gridSize; i++) {
                    const x = i % gridSize;
                    const y = Math.floor(i / gridSize);
                    const col = frameData[i];
                    if (col && col !== 'transparent') {
                        ctx.fillStyle = col;
                        ctx.fillRect(xOffset + (x * 16), y * 16, 16, 16);
                    }
                }
            });

            const link = document.createElement('a');
            link.download = `pixelforge-spritesheet-${gridSize}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
            playSound(880, 0.35, 'sine');
        }

        window.onload = () => {
            frames = [Array(gridSize * gridSize).fill('transparent')];
            buildGridUI();
            buildPaletteSwatches();
            buildTimelineUI();
            setInterval(renderLivePreview, 250);
        };
    </script>
</body>
</html>
